# CI/CD Pipeline
# dev branch -> staging
# master branch -> internal (Custom Downloads)
# master branch -> live



# Define stages for the CI/CD pipeline
stages:
  - test_build_static
  - deploy

variables:
  CONTAINER_IMAGE: ${CI_REGISTRY_IMAGE}:nginx-${CI_COMMIT_SHORT_SHA}
  CONTAINER_NODE_IMAGE: ${CI_REGISTRY_IMAGE}:node-${CI_COMMIT_SHORT_SHA}
  KUBE_CONTEXT: ens-dev-ctx
  DEPLOYENV: dev
  ENVIRONMENT: production
  DOCKER_TLS_CERTDIR: ""

# Template to build static assets
.build-static:
  stage: test_build_static
  image: node:14.17.0

  before_script:
  - cd src/ensembl
  - npm install --global npm@7.12.1
  - npm ci

  script:
  - npm run test
  - npm run build

  after_script:
    - echo "Setting env for next job"
    - echo "BUILD_JOB_ID=${CI_JOB_ID}" >> build_static.env
    - cat build_static.env

  artifacts:
    name: build_artifacts
    paths:
      - src/ensembl/dist/
      - src/ensembl/package.json
      - src/ensembl/package-lock.json
    reports: 
      dotenv: build_static.env 


.push_static:
  image: dockerhub.ebi.ac.uk/ensembl-web/deploy-tools:0.5
  stage: deploy
  environment:
    name : wp-hx-dev-ing
  script:
    - git clone https://gitlab.ebi.ac.uk/ensembl-web/ensembl-k8s-manifests.git
    - git -C ensembl-k8s-manifests/ checkout wp-k8s-review
    - sed -i "s#<PROJECT_ID>#${CI_PROJECT_ID}#g" ensembl-k8s-manifests/static_assets_copy_job.yaml
    - sed -i "s#<JOB_ID>#${BUILD_JOB_ID}#g" ensembl-k8s-manifests/static_assets_copy_job.yaml
    - cat ensembl-k8s-manifests/static_assets_copy_job.yaml


Test_N_Build:
  extends: .build-static

PushStatic:
  extends: .push_static
  needs:
    - Test_N_Build